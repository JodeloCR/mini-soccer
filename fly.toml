# Fly.io config. Region qro = Querétaro, Mexico — closest to Costa Rica.
# Deploy: flyctl launch --copy-config --no-deploy  (then)  flyctl deploy
app = "huateque-mini-futbol"
primary_region = "qro"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  # keep one machine warm so there's no cold start at the restaurant
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    path = "/healthz"
    interval = "30s"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
